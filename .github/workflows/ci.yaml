name: Personal Proj

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/sanrose-bhets/Job-Grinder

jobs:
    build-and-push:
        runs-on: buntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v3
            - name: Image tag generation
              id: meta
              uses: docker/metadata-action@v4
              with: 
                images: ${{env.IMAGE_NAME}}
                tags: |
                    type=raw,value=latest
                    type=sha,prefix=,format=short
            

            - name: logging in to Github Container Services 
              uses: docker/login-action@v2
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}


            
            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: |
                  ghcr.io/sanrose-bhets/my-job-grinder:1.1.${{github.run_number}}
                  ghcr.io/sanrose-bhets/my-job-grinder:latest
                labels: ${{ steps.meta.outputs.labels }}

        